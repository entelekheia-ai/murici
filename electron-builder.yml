appId: com.entelekheia.murici
productName: Murici
copyright: "Copyright © 2026 Danilo Borges. All rights reserved."

fileAssociations:
  - ext: agent
    name: Agent File
    role: Editor
    icon: dot-agent-icon

directories:
  output: dist-electron
  buildResources: electron/assets

# Only the compiled electron process + resources
files:
  - electron-dist/**
  - "!node_modules/**"
  - node_modules/@dot-agent/**
  - "!node_modules/@dot-agent/**/target/**"
  - "!node_modules/@dot-agent/**/src/**"
  - "!node_modules/@dot-agent/**/tests/**"
  - "!node_modules/@dot-agent/**/node_modules/**"
  - "!node_modules/@dot-agent/**/*.rs"
  - "!node_modules/@dot-agent/**/Cargo.*"
  - "!node_modules/@dot-agent/**/build.rs"
  - node_modules/argparse/**
  - node_modules/builder-util-runtime/**
  - node_modules/core-util-is/**
  - node_modules/debug/**
  - node_modules/electron-is-dev/**
  - node_modules/electron-serve/**
  - node_modules/electron-updater/**
  - node_modules/fs-extra/**
  - node_modules/graceful-fs/**
  - node_modules/immediate/**
  - node_modules/inherits/**
  - node_modules/isarray/**
  - node_modules/js-yaml/**
  - node_modules/jsonfile/**
  - node_modules/jszip/**
  - node_modules/lazy-val/**
  - node_modules/lie/**
  - node_modules/lodash.escaperegexp/**
  - node_modules/lodash.isequal/**
  - node_modules/ms/**
  - node_modules/pako/**
  - node_modules/process-nextick-args/**
  - node_modules/readable-stream/**
  - node_modules/safe-buffer/**
  - node_modules/sax/**
  - node_modules/semver/**
  - node_modules/setimmediate/**
  - node_modules/string_decoder/**
  - node_modules/tiny-typed-emitter/**
  - node_modules/universalify/**
  - node_modules/util-deprecate/**
  - node_modules/web-tree-sitter/**

# Next.js standalone server packed into resources/server. Not done via
# extraResources: electron-builder's glob matcher was silently dropping
# node_modules/.next from that copy for this project; scripts/electron-after-pack.js
# does a plain recursive fs copy instead (see afterPack below).
afterPack: scripts/electron-after-pack.js

# WASM and kernel binaries must be outside ASAR
asarUnpack:
  - "**/*.wasm"
  - "**/dot-agent-kernel/**"

mac:
  icon: icon.icon
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.productivity
  darkModeSupport: true

dmg:
  icon: icon.icns

win:
  target:
    - target: nsis
      arch: [x64]

linux:
  target:
    - target: AppImage
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  releaseType: release
